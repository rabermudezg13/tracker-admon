<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miami Dade Recruiter Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red:     #C8102E;
    --red2:    #a50d25;
    --bg:      #0d0d0f;
    --card:    #141417;
    --card2:   #1a1a1f;
    --border:  rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.11);
    --text:    #f0eef8;
    --muted:   #7a7890;
    --success: #00D49A;
    --warn:    #FFB830;
    --info:    #4D9FFF;

    --rodrigo:  #C8102E;
    --miccael:  #9B59B6;
    --nicolette:#2ECC71;
    --jorge:    #E67E22;
    --demetrius:#3498DB;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG glow */
  body::before {
    content:'';
    position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 70% 50% at 15% 10%, rgba(200,16,46,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 85% 80%, rgba(77,159,255,0.05) 0%, transparent 60%);
  }

  /* HEADER */
  header {
    position: relative; z-index: 10;
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: .75rem;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(12px);
  }
  .logo { display:flex; align-items:center; gap:.65rem; }
  .logo-mark {
    width: 32px; height: 32px; background: var(--red);
    border-radius: 8px; display: grid; place-items: center;
    font-family: 'Syne', sans-serif; font-weight: 800; font-size: .85rem; color: #fff;
  }
  .logo-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; }
  .logo-sub { font-size:.68rem; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }

  /* UPLOAD */
  #upload-zone {
    position: relative; z-index: 5;
    max-width: 520px; margin: 5rem auto; padding: 0 1.5rem;
    text-align: center; animation: rise .6s ease both;
  }
  .upload-box {
    border: 2px dashed rgba(200,16,46,0.35);
    border-radius: 20px; padding: 3.5rem 2rem;
    background: rgba(255,255,255,0.02); cursor: pointer;
    transition: all .3s;
  }
  .upload-box:hover, .upload-box.over { border-color: var(--red); background: rgba(200,16,46,0.06); }
  .upload-icon { font-size: 3rem; margin-bottom: 1rem; }
  .upload-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1.3rem; margin-bottom:.5rem; }
  .upload-hint { color:var(--muted); font-size:.85rem; }

  /* MAIN LAYOUT */
  #main {
    display: none; position: relative; z-index: 5;
    max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem;
    animation: rise .5s ease both;
  }

  /* RECRUITER TABS */
  .recruiter-tabs {
    display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1.75rem;
    border-bottom: 1px solid var(--border); padding-bottom: .75rem;
  }
  .rec-tab {
    display: flex; align-items: center; gap: .5rem;
    padding: .5rem 1.1rem; border-radius: 10px;
    font-size: .82rem; font-weight: 600; cursor: pointer;
    border: 1px solid transparent; transition: all .2s;
    font-family: 'DM Sans', sans-serif; background: transparent;
    color: var(--muted); position: relative;
  }
  .rec-tab:hover { background: rgba(255,255,255,0.05); color: var(--text); }
  .rec-tab.active { color: #fff; border-color: currentColor; }
  .rec-tab .tab-count {
    font-size: .68rem; font-weight: 700;
    background: rgba(255,255,255,0.12);
    padding: .1rem .45rem; border-radius: 99px;
  }
  .rec-tab.active .tab-count { background: rgba(255,255,255,0.2); }

  /* Color per recruiter */
  .rec-tab[data-rec="Rodrigo"].active  { background: rgba(200,16,46,0.15);  color: #ff4060; border-color: rgba(200,16,46,0.4); }
  .rec-tab[data-rec="Miccael"].active  { background: rgba(155,89,182,0.15); color: #c07fe8; border-color: rgba(155,89,182,0.4); }
  .rec-tab[data-rec="Nicolette"].active{ background: rgba(46,204,113,0.12); color: #2ecc71; border-color: rgba(46,204,113,0.4); }
  .rec-tab[data-rec="Jorge"].active    { background: rgba(230,126,34,0.13); color: #f39c12; border-color: rgba(230,126,34,0.4); }
  .rec-tab[data-rec="Demetrius"].active{ background: rgba(52,152,219,0.13); color: #5dade2; border-color: rgba(52,152,219,0.4); }

  /* STATS ROW */
  .stats-row {
    display: grid; grid-template-columns: repeat(4,1fr); gap: .85rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1rem 1.2rem;
    transition: border-color .2s;
  }
  .stat-card:hover { border-color: var(--border2); }
  .stat-val { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; line-height:1; }
  .stat-lbl { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; margin-top:.3rem; }

  /* STAGE BADGES */
  .stage-bar {
    display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1.5rem;
  }
  .stage-pill {
    padding: .3rem .85rem; border-radius: 99px; font-size: .74rem; font-weight: 600;
    cursor: pointer; border: 1px solid transparent; transition: all .2s;
    font-family: 'DM Sans', sans-serif;
  }
  .stage-pill.all    { background:rgba(255,255,255,0.07); color:var(--text); }
  .stage-pill.s1     { background:rgba(77,159,255,0.12); color:var(--info); border-color:rgba(77,159,255,0.2); }
  .stage-pill.s2     { background:rgba(255,184,48,0.12); color:var(--warn); border-color:rgba(255,184,48,0.2); }
  .stage-pill.s3     { background:rgba(0,212,154,0.1);  color:var(--success); border-color:rgba(0,212,154,0.2); }
  .stage-pill.active { box-shadow: 0 0 0 2px currentColor; }

  /* MODULE GRID */
  .section-title {
    font-family:'Syne',sans-serif; font-size:.72rem; font-weight:700;
    text-transform:uppercase; letter-spacing:.1em; color:var(--muted);
    margin-bottom:.85rem;
  }
  .modules-grid {
    display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
    gap: .75rem; margin-bottom: 1.75rem;
  }
  .mod-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 1rem 1.1rem; cursor: pointer;
    transition: all .22s; position: relative; overflow: hidden;
  }
  .mod-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .mod-card.active { border-color: currentColor; }
  .mod-card::after {
    content:''; position:absolute; bottom:0; left:0; right:0;
    height:3px; background:currentColor; opacity:.5;
    transform: scaleX(0); transition: transform .2s;
  }
  .mod-card:hover::after, .mod-card.active::after { transform: scaleX(1); }
  .mod-icon { font-size:1.4rem; margin-bottom:.5rem; }
  .mod-name { font-size:.78rem; font-weight:600; margin-bottom:.4rem; }
  .mod-count { font-size:1.6rem; font-weight:800; font-family:'Syne',sans-serif; line-height:1; }
  .mod-pct   { font-size:.68rem; color:var(--muted); margin-top:.2rem; }
  .mod-bar   { height:3px; background:rgba(255,255,255,0.07); border-radius:99px; margin-top:.6rem; }
  .mod-bar-fill { height:100%; border-radius:99px; background:currentColor; transition: width .5s ease; }

  /* TALENT TABLE */
  #talent-panel { display:none; animation: rise .3s ease both; }
  .panel-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:1rem; flex-wrap:wrap; gap:.5rem;
  }
  .panel-title { font-family:'Syne',sans-serif; font-size:1rem; font-weight:700; }
  .close-btn {
    padding:.3rem .8rem; border-radius:8px; border:1px solid var(--border2);
    background:transparent; color:var(--muted); cursor:pointer; font-size:.78rem;
    font-family:'DM Sans',sans-serif; transition:all .2s;
  }
  .close-btn:hover { color:var(--text); border-color:var(--text); }

  .talent-table { width:100%; border-collapse:collapse; }
  .talent-table th {
    text-align:left; padding:.6rem .9rem; font-size:.68rem; font-weight:600;
    color:var(--muted); text-transform:uppercase; letter-spacing:.06em;
    border-bottom:1px solid var(--border); white-space:nowrap;
  }
  .talent-table td {
    padding:.7rem .9rem; font-size:.82rem; border-bottom:1px solid rgba(255,255,255,0.04);
    vertical-align:middle;
  }
  .talent-table tr:last-child td { border-bottom:none; }
  .talent-table tr:hover td { background:rgba(255,255,255,0.03); }
  .table-wrap {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; overflow:hidden; overflow-x:auto;
  }

  .stage-badge {
    display:inline-block; padding:.2rem .65rem; border-radius:99px;
    font-size:.68rem; font-weight:600; white-space:nowrap;
  }
  .stage-1 { background:rgba(77,159,255,0.15); color:var(--info); }
  .stage-2 { background:rgba(255,184,48,0.13); color:var(--warn); }
  .stage-3 { background:rgba(0,212,154,0.12);  color:var(--success); }
  .stage-x { background:rgba(255,255,255,0.07); color:var(--muted); }

  .pending-tags { display:flex; flex-wrap:wrap; gap:.25rem; }
  .ptag {
    padding:.15rem .5rem; border-radius:5px; font-size:.65rem; font-weight:500;
    background:rgba(200,16,46,0.12); color:#ff6080;
    border:1px solid rgba(200,16,46,0.2);
  }

  /* COPY ACTIONS */
  .actions-row {
    display:flex; gap:.5rem; flex-wrap:wrap; margin-bottom:1rem;
  }
  .btn {
    padding:.42rem .95rem; border-radius:9px; font-size:.78rem; font-weight:500;
    cursor:pointer; border:1px solid var(--border2); transition:all .2s;
    font-family:'DM Sans',sans-serif; background:rgba(255,255,255,0.05); color:var(--text);
  }
  .btn:hover { background:rgba(255,255,255,0.1); }
  .btn-red { background:var(--red); border-color:transparent; color:#fff; }
  .btn-red:hover { background:var(--red2); }

  /* TOAST */
  #toast {
    position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(30,30,38,0.95); border:1px solid var(--border2);
    padding:.65rem 1.4rem; border-radius:10px; font-size:.82rem;
    opacity:0; transition:all .3s; z-index:999; pointer-events:none;
    backdrop-filter:blur(12px); white-space:nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @keyframes rise { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  @media(max-width:640px) {
    header { padding:.8rem 1rem; }
    #main { padding:1rem 1rem 3rem; }
    .stats-row { grid-template-columns:repeat(2,1fr); }
    .modules-grid { grid-template-columns:repeat(2,1fr); }
    .recruiter-tabs { gap:.3rem; }
    .rec-tab { padding:.4rem .75rem; font-size:.75rem; }
  }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="logo">
    <div class="logo-mark">K</div>
    <div>
      <div class="logo-title">Miami Dade Tracker</div>
      <div class="logo-sub">Recruiter Dashboard · 2025–2026</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;">
    <span id="file-name" style="font-size:.75rem;color:var(--muted);"></span>
    <button class="btn" onclick="resetApp()" id="reset-btn" style="display:none;">↩ New File</button>
  </div>
</header>

<!-- UPLOAD -->
<div id="upload-zone">
  <div class="upload-box" id="drop-zone"
    onclick="document.getElementById('file-input').click()"
    ondragover="event.preventDefault();this.classList.add('over')"
    ondragleave="this.classList.remove('over')"
    ondrop="handleDrop(event)">
    <div class="upload-icon">📊</div>
    <div class="upload-title">Upload Tracker Workbook</div>
    <div class="upload-hint" style="margin-bottom:1rem;">Miami_Dade_Tracker_2025-2026.xlsx</div>
    <div class="upload-hint">Drag & drop or click to browse</div>
  </div>
  <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
</div>

<!-- MAIN DASHBOARD -->
<div id="main">

  <!-- RECRUITER TABS -->
  <div class="recruiter-tabs" id="recruiter-tabs"></div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row"></div>

  <!-- STAGE FILTER -->
  <div class="stage-bar" id="stage-bar"></div>

  <!-- MODULE CARDS -->
  <div class="section-title">Pending by Module</div>
  <div class="modules-grid" id="modules-grid"></div>

  <!-- TALENT PANEL -->
  <div id="talent-panel">
    <div class="panel-header">
      <div class="panel-title" id="panel-title"></div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        <button class="btn" onclick="copyEmails()">📧 Copy Emails (Outlook)</button>
        <button class="btn" onclick="copyKSNs()">🪪 Copy KSN IDs</button>
        <button class="btn" onclick="downloadPhones()">📱 Phones CSV</button>
        <button class="btn" style="background:rgba(200,16,46,0.15);color:#ff6080;border-color:rgba(200,16,46,0.3);" onclick="showTemplates()">✉️ Ver Templates</button>
        <button class="close-btn" onclick="closePanel()">✕ Close</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="talent-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>KSN</th>
            <th>Phone</th>
            <th>Stage</th>
            <th>Days</th>
            <th>Pending Items</th>
          </tr>
        </thead>
        <tbody id="talent-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<footer style="position:relative;z-index:5;text-align:center;padding:2rem 1rem 2.5rem;border-top:1px solid var(--border);margin-top:3rem;">
  <span style="font-size:.75rem;color:var(--muted);">Made with <span style="color:var(--red);">♥</span> by Rodrigo Bermudez</span>
</footer>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const RECRUITERS = ['Rodrigo','Miccael','Nicolette','Jorge','Demetrius'];

const RECRUITER_COLORS = {
  Rodrigo:  '#ff4060',
  Miccael:  '#c07fe8',
  Nicolette:'#2ecc71',
  Jorge:    '#f39c12',
  Demetrius:'#5dade2',
};

// Sheets: Rodrigo has headers on row 1, others on row 2
const HEADER_ROW = { Rodrigo:0, Miccael:1, Nicolette:1, Jorge:1, Demetrius:1 };

// Modules to track — fuzzy key matching
const MODULES = [
  { key:'pre-hire|classmarts|classsmarts', label:'Pre-hire Training', icon:'📋', col:null },
  { key:'safety|policy explainer',         label:'Safety & Security', icon:'🦺', col:null },
  { key:'i-9',               label:'I-9',                icon:'📝', col:null },
  { key:'education',         label:'Education Req.',     icon:'🎒', col:null },
  { key:'drug screen',       label:'Drug Screen',        icon:'💊', col:null },
  { key:'background',        label:'Background Check',   icon:'🔍', col:null },
  { key:'fp screening',      label:'FP Screening',       icon:'🖐', col:null },
  { key:'mdps',              label:'MDPS Training',      icon:'📅', col:null },
  { key:'badge',             label:'Badge Photo',        icon:'🪪', col:null },
];

// Templates per module
const MODULE_TEMPLATES = {
  'Pre-hire Training':  { subject: 'Pre-hire Training (ClassSmarts / Safety & Security)', item: 'your pre-hire training certificates (ClassSmarts and/or Safety & Security)' },
  'Safety & Security':  { subject: 'Safety & Security Certificate',                        item: 'your Safety & Security training certificate' },
  'I-9':                { subject: 'I-9 / Employment Eligibility Verification',            item: 'your I-9 form and supporting identity documents' },
  'Education Req.':     { subject: 'Proof of Education',                                   item: 'your proof of education (diploma, transcripts, or equivalency)' },
  'Drug Screen':        { subject: 'Drug Screen',                                           item: 'your drug screen' },
  'Background Check':   { subject: 'Background Check',                                     item: 'your background check' },
  'FP Screening':       { subject: 'Fingerprint Screening',                                item: 'your fingerprint screening appointment' },
  'MDPS Training':      { subject: 'MDPS / New Hire Orientation',                          item: 'your New Hire Orientation (MDPS Training)' },
  'Badge Photo':        { subject: 'Badge Photo',                                           item: 'your badge photo' },
};

function getTemplate(modLabel, talentName) {
  const t   = MODULE_TEMPLATES[modLabel] || { subject: modLabel, item: modLabel };
  const sms = 'Hi! This is Kelly Education. We still need ' + t.item + '. Please send the information to your recruiter as soon as possible. Thank you!';
  const email = 'Subject: Action Required — ' + t.subject + '\n\n' +
    'Dear Candidate,\n\n' +
    'We are reaching out from Kelly Education regarding your onboarding process. We still need ' + t.item + ' to move forward.\n\n' +
    'Please send the information to your recruiter as soon as possible so we can continue with your placement.\n\n' +
    'If you have any questions, feel free to reach out.\n\nThank you,\nKelly Education — Miami Dade';
  return { sms, email };
}

const INCOMPLETE_VALS = new Set(['','0','no','pending','n/a','false','-','not submitted',
  'incomplete','tbd','not done','missing','need certificate','initiated','requested',
  'will send','info requested','ch review pending','scheduled','taken']);

function isIncomplete(val) {
  if (val === null || val === undefined) return true;
  const s = String(val).trim().toLowerCase();
  return INCOMPLETE_VALS.has(s);
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let allData   = {};   // { recruiterName: [ rowObj, ... ] }
let curRec    = null;
let curStage  = 'all';
let curMod    = null;

// ═══════════════════════════════════════════════════════
// FILE HANDLING
// ═══════════════════════════════════════════════════════
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('over');
  handleFile(e.dataTransfer.files[0]);
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => parseWorkbook(e.target.result, file.name);
  reader.readAsArrayBuffer(file);
}

function parseWorkbook(buffer, fileName) {
  const wb = XLSX.read(buffer, { type:'array', cellDates:true });
  allData = {};

  RECRUITERS.forEach(name => {
    if (!wb.SheetNames.includes(name)) return;
    const ws   = wb.Sheets[name];
    const raw  = XLSX.utils.sheet_to_json(ws, { header:1, defval:null });
    const hRow = HEADER_ROW[name];

    if (raw.length <= hRow) return;
    const headers = raw[hRow];

    // Build column index for modules
    const colMap = {};
    headers.forEach((h, i) => {
      if (!h) return;
      const hl = String(h).toLowerCase().trim();
      MODULES.forEach(m => {
        const keys = m.key.split('|');
        if (keys.some(k => hl.includes(k)) && colMap[m.key] === undefined) {
          colMap[m.key] = i;
        }
      });
    });

    // Parse rows
    const talents = [];
    for (let r = hRow + 1; r < raw.length; r++) {
      const row = raw[r];
      if (!row || !row[2]) continue;  // skip empty rows

      const name    = String(row[2] || '').trim();
      if (!name) continue;

      const phone   = row[9]  ? String(row[9]).replace(/\D/g,'').slice(-10) : '';
      const email   = row[10] ? String(row[10]).trim() : '';
      const stage   = row[12] ? String(row[12]).trim() : '';
      const ksnId   = row[3]  ? String(row[3]).trim() : '';
      const notes   = row[29] || row[28] ? String(row[29] || row[28] || '').trim() : '';

      // Days in process
      let days = '';
      const daysCol = headers.findIndex(h => h && String(h).toLowerCase().includes('days'));
      if (daysCol >= 0 && row[daysCol]) days = String(row[daysCol]).replace(/\D/g,'');

      // Date added
      let dateAdded = '';
      if (row[5]) {
        try {
          const d = new Date(row[5]);
          dateAdded = (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
        } catch(e) {}
      }

      // Pending modules
      const pending = [];
      MODULES.forEach(m => {
        const col = colMap[m.key];
        if (col === undefined) return;
        const val = row[col];
        if (isIncomplete(val)) pending.push(m.label);
      });

      talents.push({ name, phone, email, stage, ksnId, notes, days, dateAdded, pending, colMap, row });
    }

    allData[name] = { talents, colMap, headers };
  });

  document.getElementById('file-name').textContent = fileName;
  document.getElementById('reset-btn').style.display = 'inline-block';
  document.getElementById('upload-zone').style.display = 'none';
  document.getElementById('main').style.display = 'block';

  buildTabs();
  curRec = RECRUITERS.find(r => allData[r]) || null;
  setActiveTab(curRec);
}

// ═══════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════
function buildTabs() {
  const container = document.getElementById('recruiter-tabs');
  container.innerHTML = '';

  RECRUITERS.forEach(rec => {
    if (!allData[rec]) return;
    const count = allData[rec].talents.length;
    const btn   = document.createElement('button');
    btn.className = 'rec-tab';
    btn.dataset.rec = rec;
    btn.innerHTML = `${rec} <span class="tab-count">${count}</span>`;
    btn.onclick = () => setActiveTab(rec);
    container.appendChild(btn);
  });
}

function setActiveTab(rec) {
  curRec   = rec;
  curStage = 'all';
  curMod   = null;
  document.querySelectorAll('.rec-tab').forEach(b => b.classList.toggle('active', b.dataset.rec === rec));
  document.getElementById('talent-panel').style.display = 'none';
  renderDashboard();
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function getFiltered() {
  if (!curRec || !allData[curRec]) return [];
  let talents = allData[curRec].talents;
  if (curStage !== 'all') {
    talents = talents.filter(t => t.stage.toLowerCase().includes(curStage));
  }
  return talents;
}

function renderDashboard() {
  const all      = allData[curRec]?.talents || [];
  const filtered = getFiltered();
  const color    = RECRUITER_COLORS[curRec] || 'var(--red)';

  // Stats
  const complete = all.filter(t => t.pending.length === 0).length;
  const pending  = all.filter(t => t.pending.length > 0).length;
  const avgDays  = all.filter(t => t.days).length
    ? Math.round(all.filter(t=>t.days).reduce((s,t) => s + parseInt(t.days||0), 0) / all.filter(t=>t.days).length)
    : '—';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card" style="border-color:${color}30">
      <div class="stat-val" style="color:${color}">${all.length}</div>
      <div class="stat-lbl">Total Talents</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--success)">${complete}</div>
      <div class="stat-lbl">All Modules Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--warn)">${pending}</div>
      <div class="stat-lbl">Pending Items</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${avgDays}</div>
      <div class="stat-lbl">Avg Days in Process</div>
    </div>
  `;

  // Stage pills
  const stages = {};
  all.forEach(t => {
    const s = t.stage || 'Unknown';
    stages[s] = (stages[s] || 0) + 1;
  });

  let stageHTML = `<span class="stage-pill all ${curStage==='all'?'active':''}" onclick="setStage('all')">All (${all.length})</span>`;
  Object.entries(stages).sort().forEach(([s, cnt]) => {
    const cls = s.includes('1.') ? 's1' : s.includes('2.') ? 's2' : s.includes('3.') ? 's3' : 'all';
    const key = s.toLowerCase().replace(/[^a-z0-9]/g,'');
    stageHTML += `<span class="stage-pill ${cls} ${curStage===key?'active':''}" onclick="setStage('${key}')">${s} (${cnt})</span>`;
  });
  document.getElementById('stage-bar').innerHTML = stageHTML;

  // Modules
  const grid = document.getElementById('modules-grid');
  grid.innerHTML = '';

  MODULES.forEach(m => {
    const { colMap } = allData[curRec];
    if (colMap[m.key] === undefined) return;

    const pendingTalents = filtered.filter(t => t.pending.includes(m.label));
    const pct = filtered.length ? Math.round((1 - pendingTalents.length/filtered.length)*100) : 100;

    const card = document.createElement('div');
    card.className = 'mod-card' + (curMod === m.key ? ' active' : '');
    card.style.color = pct === 100 ? 'var(--success)' : pct >= 70 ? 'var(--warn)' : 'var(--red)';
    card.onclick = () => toggleModule(m);
    card.innerHTML = `
      <div class="mod-icon">${m.icon}</div>
      <div class="mod-name">${m.label}</div>
      <div class="mod-count">${pendingTalents.length}</div>
      <div class="mod-pct">${pct}% complete · ${filtered.length - pendingTalents.length}/${filtered.length}</div>
      <div class="mod-bar"><div class="mod-bar-fill" style="width:${pct}%"></div></div>
    `;
    grid.appendChild(card);
  });
}

function setStage(key) {
  curStage = key;
  curMod   = null;
  document.getElementById('talent-panel').style.display = 'none';
  renderDashboard();
}

// ═══════════════════════════════════════════════════════
// MODULE PANEL
// ═══════════════════════════════════════════════════════
function toggleModule(m) {
  if (curMod === m.key) { closePanel(); return; }
  curMod = m.key;
  renderDashboard();
  showPanel(m);
}

function showPanel(m) {
  const filtered = getFiltered();
  const talents  = filtered.filter(t => t.pending.includes(m.label));

  document.getElementById('panel-title').textContent =
    `${m.icon} ${m.label} — ${talents.length} pending`;

  const tbody = document.getElementById('talent-tbody');
  tbody.innerHTML = '';

  talents.forEach(t => {
    const stageClass = t.stage.includes('1.') ? 'stage-1' : t.stage.includes('2.') ? 'stage-2' : t.stage.includes('3.') ? 'stage-3' : 'stage-x';
    const stageShort = t.stage.replace(/^\d\.\s*/,'').replace('Steps/Training','Prehire').replace('and Screenings','Screenings').replace('Pending Activation','Pending');
    const pendingTags = t.pending.map(p => `<span class="ptag">${p}</span>`).join('');
    const phone = t.phone ? t.phone.replace(/(\d{3})(\d{3})(\d{4})/, '($1) $2-$3') : '—';

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>
        <div style="font-weight:500">${t.name}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.1rem">${t.email || '—'}</div>
      </td>
      <td style="color:var(--info);font-size:.78rem;white-space:nowrap">${t.ksnId || '—'}</td>
      <td style="white-space:nowrap">${phone}</td>
      <td><span class="stage-badge ${stageClass}">${stageShort}</span></td>
      <td style="color:var(--muted);text-align:center">${t.days || '—'}</td>
      <td><div class="pending-tags">${pendingTags}</div></td>
    `;
    tbody.appendChild(tr);
  });

  // Store for copy actions
  window._panelTalents = talents;
  document.getElementById('talent-panel').style.display = 'block';
  document.getElementById('talent-panel').scrollIntoView({ behavior:'smooth', block:'start' });
}

function closePanel() {
  curMod = null;
  document.getElementById('talent-panel').style.display = 'none';
  renderDashboard();
}

// ═══════════════════════════════════════════════════════
// COPY / EXPORT
// ═══════════════════════════════════════════════════════
function copyEmails() {
  const talents = window._panelTalents || [];
  const emails  = talents.map(t => t.email).filter(Boolean);
  if (!emails.length) { toast('No emails found'); return; }
  navigator.clipboard.writeText(emails.join(';')).then(() => toast(`✓ ${emails.length} emails copied`));
}

function downloadPhones() {
  const talents = window._panelTalents || [];
  const rows    = [['Name','Phone']].concat(
    talents.filter(t => t.phone).map(t => ['"'+t.name+'"', '"'+t.phone+'"'])
  );
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a'); a.href = url; a.download = 'phones.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(`✓ ${rows.length-1} phones downloaded`);
}

function copyKSNs() {
  const talents = window._panelTalents || [];
  const ksns = talents.map(t => t.ksnId).filter(Boolean);
  if (!ksns.length) { toast('No KSN IDs found'); return; }
  navigator.clipboard.writeText(ksns.join(';')).then(() => toast('✓ ' + ksns.length + ' KSN IDs copied'));
}

function showTemplates() {
  const talents = window._panelTalents || [];
  if (!talents.length || !curMod) return;
  const mod = MODULES.find(m => m.label === curMod);
  if (!mod) return;

  // Build modal
  const existing = document.getElementById('tmpl-modal');
  if (existing) existing.remove();

  const tpl = getTemplate(mod.label, '');
  const modal = document.createElement('div');
  modal.id = 'tmpl-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px);';
  modal.innerHTML =
    '<div style="background:#141417;border:1px solid rgba(255,255,255,0.11);border-radius:18px;max-width:560px;width:100%;padding:1.5rem;max-height:85vh;overflow-y:auto;">' +
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">' +
        '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:1rem;">' + mod.icon + ' Templates — ' + mod.label + '</div>' +
        '<button onclick="document.getElementById('tmpl-modal').remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;">✕</button>' +
      '</div>' +
      '<div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;">📱 SMS / WhatsApp</div>' +
      '<div id="tmpl-sms" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:.9rem;font-size:.85rem;line-height:1.6;white-space:pre-wrap;margin-bottom:.75rem;">' + tpl.sms + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById('tmpl-sms').textContent).then(()=>toast('✓ SMS copied'))" style="padding:.4rem .9rem;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-size:.78rem;margin-bottom:1.25rem;">📋 Copiar SMS</button>' +
      '<div style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.5rem;">📧 Email</div>' +
      '<div id="tmpl-email" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;padding:.9rem;font-size:.85rem;line-height:1.6;white-space:pre-wrap;margin-bottom:.75rem;">' + tpl.email + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById('tmpl-email').textContent).then(()=>toast('✓ Email copied'))" style="padding:.4rem .9rem;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.06);color:#fff;cursor:pointer;font-size:.78rem;">📋 Copiar Email</button>' +
    '</div>';
  modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
  document.body.appendChild(modal);
}

function resetApp() {
  allData = {}; curRec = null; curStage = 'all'; curMod = null;
  document.getElementById('main').style.display = 'none';
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('reset-btn').style.display = 'none';
  document.getElementById('file-name').textContent = '';
  document.getElementById('file-input').value = '';
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
</script>
</body>
</html>
